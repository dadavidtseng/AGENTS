# Agent Lead Configuration
# Secrets go in secrets.toml (gitignored)

[agent]
ID = "agent-lead"
VERSION = "0.3.0"
ROLE = "programmer"

[logging]
LEVEL = "debug"

#[broker.local]
#URL = "ws://localhost:8080/kadi"

[broker.remote]
URL = "wss://broker.dadavidtseng.com/kadi"
NETWORKS = ["producer", "programmer", "git", "qa", "deploy", "quest", "file", "global"]

[provider]
PRIMARY = "model-manager"
FALLBACK = "anthropic"

[provider.model-manager]
MODEL = "gpt-5-mini"

[provider.anthropic]
MODEL = "claude-haiku-4-5-20251001"

[memory]
DATA_PATH = "./data/memory"

[repo]
PATH = "/mnt/c/GitHub/agent-playground"

[secrets]
VAULTS = ["anthropic", "model-manager", "arcadedb"]
KEYS = ["ANTHROPIC_API_KEY", "MODEL_MANAGER_API_KEY", "MODEL_MANAGER_BASE_URL", "ARCADE_USERNAME", "ARCADE_PASSWORD"]

[arcadedb]
HOST = "arcadedb.dadavidtseng.com"
PORT = 443
USERNAME = "root"
DATABASE = "agents_logs"

# Per-role network configuration
# kadi run start:artist → AGENT_ROLE=artist → reads [roles.artist.NETWORKS]

[roles.artist]
NETWORKS = ["producer", "artist", "git", "qa", "quest", "file", "global"]

[roles.designer]
NETWORKS = ["producer", "designer", "git", "qa", "quest", "file", "global"]

[roles.programmer]
NETWORKS = ["producer", "programmer", "git", "qa", "deploy", "quest", "file", "global"]
