---
# Akash SDL for AGENTS Documentation Site
# Static Docusaurus site served by nginx
# Image: ghcr.io/dadavidtseng/agents-docs:latest
version: "2.0"

services:
  web:
    image: ghcr.io/dadavidtseng/agents-docs:latest
    expose:
      - port: 80
        as: 80
        to:
          - global: true

profiles:
  compute:
    web:
      resources:
        cpu:
          units: 0.5
        memory:
          size: 256Mi
        storage:
          size: 512Mi
  placement:
    dcloud:
      pricing:
        web:
          denom: uakt
          amount: 1000

deployment:
  web:
    dcloud:
      profile: web
      count: 1
