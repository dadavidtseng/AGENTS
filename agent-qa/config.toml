# Agent QA Configuration

[agent]
ID = "agent-qa"
VERSION = "0.3.0"
ROLE = "qa"

[logging]
LEVEL = "debug"

#[broker.local]
#URL = "ws://localhost:8080/kadi"
#NETWORKS = ["qa", "quest", "git", "eval", "global"]

[broker.remote]
URL = "wss://broker.dadavidtseng.com/kadi"
NETWORKS = ["qa", "quest", "git", "eval", "global"]

[provider]
PRIMARY = "model-manager"
FALLBACK = "anthropic"

[provider.model-manager]
MODEL = "gpt-5-mini"

[provider.anthropic]
MODEL = "claude-haiku-4-5-20251001"

[memory]
DATA_PATH = "./data/memory"

[secrets]
VAULTS = ["anthropic", "model-manager", "arcadedb"]
KEYS = ["ANTHROPIC_API_KEY", "MODEL_MANAGER_API_KEY", "MODEL_MANAGER_BASE_URL", "ARCADE_USERNAME", "ARCADE_PASSWORD"]

[arcadedb]
HOST = "arcadedb.dadavidtseng.com"
PORT = 443
USERNAME = "root"
DATABASE = "agents_logs"
