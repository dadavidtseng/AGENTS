# Agent Quest Configuration
# Secrets go in secrets.toml (gitignored)

[agent]
ID = "agent-quest"
VERSION = "0.3.1"

[server]
PORT = 8888
CORS_ORIGINS = "http://localhost:5173"

[logging]
LEVEL = "debug"

[broker.local]
URL = "ws://localhost:8080/kadi"
NETWORKS = ["quest", "global"]

#[broker.remote]
#URL = "wss://broker.dadavidtseng.info/kadi"
