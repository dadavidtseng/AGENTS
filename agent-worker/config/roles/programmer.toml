# Programmer Role Configuration

role = "programmer"
capabilities = ["code-generation", "programming", "software-development", "debugging", "refactoring", "testing"]
maxConcurrentTasks = 1
mainRepoPath = "/mnt/c/GitHub/agent-playground"
worktreePath = "/mnt/c/GitHub/agent-playground-programmer"
eventTopic = "task"
commitFormat = "feat: implement code for task {taskId}"
tools = ["git_git_", "ability_file_", "spawn_cube", "move_cube", "remove_cube", "get_game_state", "capture_screenshot", "create_script", "read_script", "delete_script", "modify_script", "restart_game", "rebuild_game"]
networks = ["programmer", "git", "qa", "file", "quest", "global"]

[provider]
temperature = 0.3
maxTokens = 16384

[memory]
enabled = true
namespace = "programmer"
