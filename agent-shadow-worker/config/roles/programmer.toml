# Shadow Programmer Role Configuration

role = "programmer"
workerBranch = "agent-playground-programmer"
shadowBranch = "agent-playground-shadow-programmer"
monitoringInterval = 5000
debounceMs = 1000

[provider]
model = "gpt-5-mini"
temperature = 0.3
maxTokens = 4096

[memory]
enabled = false
namespace = "shadow-programmer"
