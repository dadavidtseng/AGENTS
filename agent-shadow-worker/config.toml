# Agent Shadow Worker Configuration
# Secrets go in secrets.toml (encrypted vault)

[agent]
ID = "agent-shadow-worker"
ROLE = "artist"
VERSION = "1.0.0"

[logging]
LEVEL = "info"

[broker.local]
URL = "ws://localhost:8080/kadi"
NETWORKS = ["git", "qa", "file"]

[broker.remote]
URL = "wss://broker.dadavidtseng.com/kadi"
NETWORKS = ["global"]

[worktree]
WORKER_PATH = "C:/GitHub/agent-playground-artist"
SHADOW_PATH = "C:/GitHub/agent-playground-shadow-artist"
WORKER_BRANCH = "agent-playground-artist"
SHADOW_BRANCH = "agent-playground-shadow-artist"

[secrets]
VAULTS = ["anthropic", "model-manager"]
