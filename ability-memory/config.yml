# ArcadeDB Admin Tool Configuration
# =====================================
# 
# This file contains all configuration settings for the ArcadeDB Admin Tool.
# You can customize these settings based on your environment and requirements.
#
# For documentation, see: https://github.com/yourusername/arcade-admin#configuration

# Server Configuration
# -------------------
# Settings for the ArcadeDB server and Docker container
server:
  # Hostname where ArcadeDB will be accessible
  host: localhost
  
  # Port for ArcadeDB HTTP API and Studio interface
  port: 2480
  
  # Docker container name (must be unique on your system)
  container_name: arcadeDB
  
  # Database authentication credentials
  username: root
  password: playwithdata
  
  # Additional server settings
  settings:
    # Maximum memory for the container (optional)
    # memory_limit: 2g
    
    # Enable SSL/TLS (requires certificate setup)
    # ssl_enabled: false
    
    # Custom Java options for ArcadeDB
    # java_opts: "-Xmx1g -XX:+UseG1GC"

# Storage Configuration
# --------------------
# Settings for data persistence and backup storage
storage:
  # Main data directory (databases, logs, etc.)
  data_dir: ./arcadedb-data
  
  # Backup storage directory
  backup_dir: ./arcadedb-data/backups
  
  # Additional storage settings
  settings:
    # Automatically create directories if they don't exist
    auto_create_dirs: true
    
    # File permissions for created directories (Unix/Linux only)
    # dir_permissions: 0755
    
    # Backup compression level (0-9, higher = more compression)
    # backup_compression: 6

# Default Settings
# ---------------
# Default values used by various commands when not specified
defaults:
  # Number of days to keep backups before cleanup
  backup_retention_days: 30
  
  # Default number of log lines to display
  log_lines: 50
  
  # Default batch size for import operations
  import_batch_size: 1000
  
  # Default timeout for operations (in seconds)
  operation_timeout: 300
  
  # Default monitoring interval (in seconds)
  monitoring_interval: 10

# Development Settings
# -------------------
# Settings specific to development and testing environments
development:
  # Enable test data loading on startup
  enable_test_data: false
  
  # Test data source URL
  test_data_url: https://github.com/ArcadeData/arcadedb-datasets/raw/main/orientdb/OpenBeer.gz
  
  # Default test database name
  test_database_name: TestDB
  
  # Enable debug logging
  debug_mode: false
  
  # Automatic cleanup on exit
  auto_cleanup: true

# Production Settings
# ------------------
# Settings optimized for production environments
production:
  # Enable stricter validation
  strict_validation: true
  
  # Require confirmation for destructive operations
  require_confirmation: true
  
  # Enable audit logging
  audit_logging: false
  
  # Audit log file path
  # audit_log_file: ./logs/audit.log
  
  # Maximum backup retention (override default in production)
  backup_retention_days: 90
  
  # Enable backup encryption (requires setup)
  # backup_encryption: false
  
  # Backup encryption key file
  # encryption_key_file: ./config/backup.key

# Monitoring Configuration
# -----------------------
# Settings for health checks and system monitoring
monitoring:
  # Health check intervals
  health_check_interval: 60  # seconds
  
  # Performance monitoring settings
  metrics:
    # Collect detailed metrics
    enabled: true
    
    # Metrics collection interval
    interval: 30  # seconds
    
    # Metrics retention period
    retention_days: 7
    
    # Export metrics to external systems
    # prometheus_enabled: false
    # prometheus_port: 9090
  
  # Alert thresholds
  alerts:
    # CPU usage threshold (percentage)
    cpu_threshold: 80
    
    # Memory usage threshold (percentage)
    memory_threshold: 85
    
    # Disk usage threshold (percentage)
    disk_threshold: 90
    
    # Response time threshold (milliseconds)
    response_time_threshold: 2000
    
    # Enable email alerts (requires SMTP setup)
    # email_alerts: false
    
    # Alert email settings
    # smtp:
    #   host: smtp.example.com
    #   port: 587
    #   username: alerts@example.com
    #   password: your-smtp-password
    #   to: admin@example.com

# Import/Export Configuration
# --------------------------
# Settings for data import and export operations
import_export:
  # Supported file formats
  formats:
    json:
      enabled: true
      max_file_size: 100MB
    csv:
      enabled: true
      max_file_size: 500MB
      delimiter: ","
      quote_char: "\""
    tsv:
      enabled: true
      max_file_size: 500MB
      delimiter: "\t"
  
  # Default export options
  export_defaults:
    include_metadata: true
    compress_output: false
    # date_format: "ISO"
  
  # Import validation settings
  import_validation:
    # Validate data types
    validate_types: true
    
    # Skip invalid records
    skip_invalid: false
    
    # Maximum error count before stopping
    max_errors: 100

# Docker Configuration
# -------------------
# Docker-specific settings and options
docker:
  # Docker image settings
  image:
    # ArcadeDB Docker image
    name: arcadedata/arcadedb
    tag: latest
    
    # Pull policy (always, if-not-present, never)
    pull_policy: if-not-present
  
  # Container runtime settings
  runtime:
    # Restart policy
    restart_policy: unless-stopped
    
    # Remove container on stop
    remove_on_stop: true
    
    # Network mode
    # network_mode: bridge
    
    # Additional port mappings
    # ports:
    #   - "2424:2424"  # Binary protocol port
  
  # Resource limits
  resources:
    # Memory limit (optional)
    # memory: 2g
    
    # CPU limit (optional)
    # cpus: 2.0
    
    # Shared memory size
    # shm_size: 64m

# Logging Configuration
# --------------------
# Settings for application and system logging
logging:
  # Log level (debug, info, warn, error)
  level: info
  
  # Log format (simple, json, structured)
  format: simple
  
  # Log file settings
  file:
    # Enable file logging
    enabled: false
    
    # Log file path
    # path: ./logs/arcade-admin.log
    
    # Maximum log file size
    # max_size: 10MB
    
    # Number of log files to keep
    # max_files: 5
  
  # Console logging settings
  console:
    enabled: true
    colors: true
    timestamps: true

# Security Configuration
# ---------------------
# Security-related settings and options
security:
  # Authentication settings
  auth:
    # Session timeout (minutes)
    session_timeout: 60
    
    # Password requirements
    password_policy:
      min_length: 8
      require_uppercase: false
      require_lowercase: false
      require_numbers: false
      require_special: false
  
  # SSL/TLS settings
  ssl:
    # Enable SSL
    enabled: false
    
    # Certificate files (when SSL is enabled)
    # cert_file: ./certs/server.crt
    # key_file: ./certs/server.key
    # ca_file: ./certs/ca.crt
  
  # Access control
  access:
    # Allowed IP addresses (empty = allow all)
    allowed_ips: []
    
    # Rate limiting
    # rate_limit:
    #   enabled: false
    #   requests_per_minute: 60

# Custom Extensions
# ----------------
# Configuration for custom plugins and extensions
extensions:
  # Custom commands directory
  # custom_commands_dir: ./extensions/commands
  
  # Plugin settings
  plugins:
    # Example plugin configuration
    # backup_uploader:
    #   enabled: false
    #   s3_bucket: my-backup-bucket
    #   aws_region: us-east-1
    
    # notification_service:
    #   enabled: false
    #   webhook_url: https://hooks.slack.com/...

# Environment-Specific Overrides
# ------------------------------
# These settings can override defaults based on NODE_ENV
environments:
  development:
    server:
      # Use different ports in development to avoid conflicts
      port: 2481
    logging:
      level: debug
    development:
      enable_test_data: true
      debug_mode: true
  
  test:
    server:
      port: 2482
      container_name: arcadeDB_test
    storage:
      data_dir: ./test-data
    defaults:
      backup_retention_days: 1
    logging:
      level: warn
  
  production:
    logging:
      level: info
      file:
        enabled: true
        path: /var/log/arcade-admin/app.log
    production:
      strict_validation: true
      require_confirmation: true
      backup_retention_days: 90
    monitoring:
      alerts:
        cpu_threshold: 70
        memory_threshold: 80
        disk_threshold: 85

