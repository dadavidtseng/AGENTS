# Agent Builder Configuration

[agent]
ID = "agent-builder"
ROLE = "builder"
VERSION = "0.1.0"

[logging]
LEVEL = "debug"

[broker.local]
URL = "ws://localhost:8080/kadi"
NETWORKS = ["utility", "deploy", "git", "file"]

[broker.remote]
URL = "wss://broker.dadavidtseng.com/kadi"
NETWORKS = ["utility"]

[build]
MSBUILD_PATH = "C:/Program Files/Microsoft Visual Studio/2022/Community/MSBuild/Current/Bin/MSBuild.exe"
SOLUTION_PATH = "C:/GitHub/DaemonAgent/DaemonAgent.sln"
CONFIGURATION = "Debug"
PLATFORM = "x64"

[game]
EXE_PATH = "C:/GitHub/DaemonAgent/Run/DaemonAgent_Debug_x64.exe"
WORKING_DIR = "C:/GitHub/DaemonAgent/Run"
READY_TIMEOUT_MS = 30000
KILL_TIMEOUT_MS = 5000

[secrets]
VAULTS = ["arcadedb"]
KEYS = ["ARCADE_USERNAME", "ARCADE_PASSWORD"]

[arcadedb]
HOST = "arcadedb.dadavidtseng.com"
PORT = 443
USERNAME = "root"
DATABASE = "agents_logs"
